<span class="font-headline-sm text-headline-sm text-surface-container-lowest tracking-tight">Dining Passport</span>

<!-- Right Panel: Form Shell -->
<div class="flex-1 flex flex-col items-center justify-center bg-surface-container-lowest px-margin-mobile lg:px-margin-desktop">
<!-- Focused 440px wide container -->
<div class="w-full max-w-[440px]">
<!-- State 1: Reset Password Form -->
<div class="w-full opacity-100 transition-opacity duration-300" id="reset-form-state">
<h1 class="font-headline-md text-headline-md text-on-surface mb-8">Reset Password</h1>
<form class="space-y-6" onsubmit="event.preventDefault(); submitReset();">
<!-- New Password Field -->
<div class="flex flex-col space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="new-password">New Password</label>
<div class="relative">
<input class="w-full h-[48px] px-4 bg-transparent border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="new-password" name="new-password" placeholder="Enter new password" required="" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant select-none">lock</span>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="confirm-password">Confirm Password</label>
<div class="relative">
<input class="w-full h-[48px] px-4 bg-transparent border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="confirm-password" name="confirm-password" placeholder="Confirm new password" required="" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant select-none">lock</span>
</div>
</div>
<!-- Actions -->
<div class="pt-4">
<button class="w-full h-[48px] bg-primary text-on-primary font-meta-data text-meta-data font-semibold rounded-lg flex items-center justify-center hover:bg-surface-tint transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2" type="submit">
                                Update password
                            </button>
</div>
</form>
</div>
<!-- State 2: Success Message (Hidden by default) -->
<div class="hidden w-full flex-col items-center text-center opacity-0 transition-opacity duration-500 pt-8" id="success-state">
<span class="material-symbols-outlined text-[64px] text-primary mb-6" style="font-variation-settings: 'FILL' 1, 'wght' 200;">check_circle</span>
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-3">Password Updated</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-8 max-w-[320px]">
                        Your password has been successfully updated.
                    </p>
<button class="w-full h-[48px] bg-transparent border border-outline-variant text-primary font-meta-data text-meta-data font-semibold rounded-lg flex items-center justify-center hover:bg-surface transition-colors duration-200" onclick="window.location.reload()">
                        Return to Sign In
                    </button>
</div>
</div>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        function submitReset() {
            const formState = document.getElementById('reset-form-state');
            const successState = document.getElementById('success-state');
            const submitBtn = formState.querySelector('button[type="submit"]');
            
            // Simulate loading state
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[20px]">progress_activity</span>';
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');

            // Simulate network request delay
            setTimeout(() => {
                // Fade out form
                formState.classList.remove('opacity-100');
                formState.classList.add('opacity-0');
                
                setTimeout(() => {
                    formState.classList.add('hidden');
                    // Show success
                    successState.classList.remove('hidden');
                    successState.classList.add('flex');
                    
                    // Trigger reflow for fade in
                    void successState.offsetWidth;
                    
                    successState.classList.remove('opacity-0');
                    successState.classList.add('opacity-100');
                }, 300); // Wait for fade out to complete
            }, 800);
        }
    </script>
