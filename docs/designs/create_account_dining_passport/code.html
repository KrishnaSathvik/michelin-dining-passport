<div class="relative flex items-center">
<input class="h-12 w-full border border-outline-variant rounded bg-transparent px-4 py-2 text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant/60" id="name" placeholder="e.g. Auguste Escoffier" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-label-caps font-label-caps text-on-surface uppercase" for="email">Email Address</label>
<div class="relative flex items-center">
<input class="h-12 w-full border border-outline-variant rounded bg-transparent px-4 py-2 text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant/60" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-label-caps font-label-caps text-on-surface uppercase" for="password">Password</label>
<div class="relative flex items-center">
<input class="h-12 w-full border border-outline-variant rounded bg-transparent px-4 py-2 text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant/60" id="password" placeholder="••••••••" type="password"/>
</div>
</div>

<label class="text-label-caps font-label-caps text-on-surface uppercase" for="confirm_password">Confirm Password</label>
<div class="relative flex items-center">
<input class="h-12 w-full border border-outline-variant rounded bg-transparent px-4 py-2 text-body-md font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant/60" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
